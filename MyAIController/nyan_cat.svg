<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">

  <!-- Night sky background -->
  <rect width="100" height="100" fill="#000022"/>

  <!-- Stars -->
  <circle cx="8" cy="8" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="22" cy="18" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="5" cy="35" r="1" fill="white" opacity="0.8"/>
  <circle cx="18" cy="55" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="8" cy="72" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="20" cy="88" r="1" fill="white" opacity="0.7"/>
  <circle cx="90" cy="10" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="82" cy="25" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="94" cy="50" r="1" fill="white" opacity="0.9"/>
  <circle cx="88" cy="75" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="92" cy="90" r="0.8" fill="white" opacity="0.8"/>

  <!-- Rainbow trail (6 stripes, left side, vertical center) -->
  <rect x="0" y="40" width="38" height="4" fill="#FF0000"/>
  <rect x="0" y="44" width="38" height="4" fill="#FF8800"/>
  <rect x="0" y="48" width="38" height="4" fill="#FFFF00"/>
  <rect x="0" y="52" width="38" height="4" fill="#00BB00"/>
  <rect x="0" y="56" width="38" height="4" fill="#0077FF"/>
  <rect x="0" y="60" width="38" height="4" fill="#9900EE"/>

  <!-- Pop-tart body -->
  <rect x="22" y="30" width="52" height="44" rx="8" fill="#FF99BB"/>
  <!-- Frosting dots -->
  <circle cx="34" cy="42" r="3" fill="#FF55AA"/>
  <circle cx="46" cy="37" r="3" fill="#FF55AA"/>
  <circle cx="58" cy="42" r="3" fill="#FF55AA"/>
  <circle cx="40" cy="54" r="3" fill="#FF55AA"/>
  <circle cx="52" cy="60" r="3" fill="#FF55AA"/>
  <circle cx="64" cy="54" r="3" fill="#FF55AA"/>
  <!-- Tart crust -->
  <rect x="22" y="30" width="52" height="44" rx="8" fill="none" stroke="#CC7733" stroke-width="2"/>

  <!-- Legs (4 stubby) -->
  <rect x="28" y="71" width="10" height="12" rx="4" fill="#AAAAAA"/>
  <rect x="42" y="71" width="10" height="12" rx="4" fill="#AAAAAA"/>
  <rect x="54" y="71" width="10" height="12" rx="4" fill="#AAAAAA"/>
  <rect x="66" y="71" width="10" height="12" rx="4" fill="#AAAAAA"/>

  <!-- Tail (curly, bottom-left of body) -->
  <path d="M24 62 Q10 72 14 82 Q18 90 24 80" fill="#AAAAAA" stroke="none"/>

  <!-- Cat head -->
  <rect x="60" y="18" width="34" height="30" rx="7" fill="#BBBBBB"/>
  <!-- Ears -->
  <polygon points="62,20 68,8 74,20" fill="#BBBBBB"/>
  <polygon points="78,20 84,8 90,20" fill="#BBBBBB"/>
  <polygon points="64,20 68,11 72,20" fill="#FF99BB"/>
  <polygon points="80,20 84,11 88,20" fill="#FF99BB"/>
  <!-- Eyes (happy arches) -->
  <path d="M65 32 Q70 27 75 32" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <path d="M79 32 Q84 27 89 32" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="77" cy="38" rx="3" ry="2" fill="#FF6699"/>
  <!-- Mouth -->
  <path d="M73 42 Q77 46 81 42" fill="none" stroke="#444" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="60" y1="36" x2="68" y2="38" stroke="#666" stroke-width="1"/>
  <line x1="60" y1="40" x2="68" y2="40" stroke="#666" stroke-width="1"/>
  <line x1="86" y1="38" x2="94" y2="36" stroke="#666" stroke-width="1"/>
  <line x1="86" y1="40" x2="94" y2="40" stroke="#666" stroke-width="1"/>

</svg>