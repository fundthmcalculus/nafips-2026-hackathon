<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Turd body - stacked swirls -->
  <!-- Bottom layer - widest -->
  <ellipse cx="32" cy="52" rx="18" ry="9" fill="#5C3317"/>

  <!-- Middle layer -->
  <ellipse cx="32" cy="40" rx="13" ry="9" fill="#6B3A1F"/>

  <!-- Top layer -->
  <ellipse cx="32" cy="28" rx="9" ry="8" fill="#7A4020"/>

  <!-- Tip swirl -->
  <ellipse cx="33" cy="18" rx="5" ry="6" fill="#8B4513"/>
  <ellipse cx="35" cy="12" rx="3" ry="4" fill="#9B5523"/>
  <ellipse cx="34" cy="8" rx="2" ry="2.5" fill="#A0522D"/>

  <!-- Highlight sheen -->
  <ellipse cx="26" cy="44" rx="4" ry="2.5" fill="#7A4020" opacity="0.5"/>
  <ellipse cx="27" cy="32" rx="3" ry="2" fill="#8B4513" opacity="0.4"/>

  <!-- Eyes -->
  <circle cx="27" cy="38" r="3.5" fill="white"/>
  <circle cx="37" cy="38" r="3.5" fill="white"/>
  <circle cx="28" cy="39" r="2" fill="#1a1a1a"/>
  <circle cx="38" cy="39" r="2" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="29" cy="38" r="0.7" fill="white"/>
  <circle cx="39" cy="38" r="0.7" fill="white"/>

  <!-- Smile -->
  <path d="M26 46 Q32 51 38 46" fill="none" stroke="#3a1a00" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Stink lines -->
  <path d="M9 22 Q4 16 9 10" fill="none" stroke="#66CC00" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M15 15 Q10 8 15 2" fill="none" stroke="#66CC00" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M55 22 Q60 16 55 10" fill="none" stroke="#66CC00" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M49 15 Q54 8 49 2" fill="none" stroke="#66CC00" stroke-width="2.2" stroke-linecap="round"/>

</svg>